# Reusable workflow: run one engine job, then commit the updated /data back to main.
# The frontend reads /data straight from the repo, so a push makes it live in
# seconds (the Render rebuild is only needed for code changes).
name: run-engine-job

on:
  workflow_call:
    inputs:
      job:
        description: "engine npm script to run (main-update | lock-job | live-status | daily-housekeeping)"
        required: true
        type: string

# NOTE: no workflow-level `permissions:` or `concurrency:` here — GitHub fails
# the run at startup (startup_failure) when a workflow_call target declares
# workflow-level permissions, and concurrency must live in the callers anyway so
# the long-running live-status session doesn't block the other jobs. Callers
# grant `contents: write` and pick their own concurrency group.

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: engine/package-lock.json

      - name: Install engine deps
        working-directory: engine
        run: npm ci

      - name: Run ${{ inputs.job }}
        if: inputs.job != 'live-status'
        working-directory: engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          PREDICTION_MODEL_GROUP: ${{ secrets.PREDICTION_MODEL_GROUP }}
          PREDICTION_MODEL_KO: ${{ secrets.PREDICTION_MODEL_KO }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: npm run ${{ inputs.job }}

      # While a match is in play, live-status runs as a session: re-sync to the
      # latest committed data, poll, conflict-proof commit, sleep the budget-aware
      # interval the job wrote to .live-session, repeat. Re-syncing each loop means
      # the session builds on main-update's finalisations (a finished match drops
      # off the live feed, so only a full sync marks it "finished" — the session
      # must not overwrite that with a stale "live" snapshot). Capped at ~55 min so
      # a fresh runner takes over; the job stops writing the flag when nothing's live.
      - name: Live session — poll while matches are in play
        if: inputs.job == 'live-status'
        working-directory: engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          PREDICTION_MODEL_GROUP: ${{ secrets.PREDICTION_MODEL_GROUP }}
          PREDICTION_MODEL_KO: ${{ secrets.PREDICTION_MODEL_KO }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          end=$(( SECONDS + 3300 ))
          while true; do
            git fetch -q origin main && git reset -q --hard origin/main
            npm run live-status
            bash "$GITHUB_WORKSPACE/.github/scripts/commit-data.sh" \
              "data: live-status update [skip ci] [skip render]" \
              || echo "commit-data failed this poll; will retry next loop"
            [ -f .live-session ] || { echo "No live window — session over."; break; }
            [ "$SECONDS" -ge "$end" ] && { echo "Session cap reached — successor takes over."; break; }
            interval=$(cat .live-session)
            echo "Live session: sleeping ${interval}s…"
            sleep "$interval"
          done

      # Self-chain: GitHub's cron scheduler is unreliable for this repo (gaps of
      # hours), so each live-status run dispatches its own successor. A capped
      # live session respawns at once; an idle run sleeps until just before the
      # next kickoff (max ~25 min per hop, so the chain also re-checks often).
      # Cron + push triggers remain as backstops if a dispatch ever fails.
      - name: Heartbeat — dispatch next live-status run
        if: inputs.job == 'live-status'
        working-directory: engine
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          wait=1500
          if [ -f .live-session ]; then
            wait=5
          elif [ -f .next-kickoff ]; then
            now=$(date +%s); ko=$(cat .next-kickoff)
            wait=$(( ko - now - 120 ))
            [ "$wait" -lt 30 ] && wait=30
            [ "$wait" -gt 1500 ] && wait=1500
          fi
          echo "Heartbeat: sleeping ${wait}s before dispatching successor…"
          sleep "$wait"
          curl -sf -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/live-status.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "Successor dispatched." \
            || echo "Dispatch failed — cron/push triggers will pick up."

      - name: Commit updated data back to main
        if: inputs.job != 'live-status'
        run: |
          bash "$GITHUB_WORKSPACE/.github/scripts/commit-data.sh" \
            "data: ${{ inputs.job }} update [skip ci] [skip render]"
