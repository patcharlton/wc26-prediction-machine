# ci — typecheck + tests + web build on every code push.
# Data commits from the engine jobs carry [skip ci], and the paths filter keeps
# this from running on data-only changes, so it only fires on real code pushes.
name: ci

on:
  push:
    branches: [main]
    paths:
      - "engine/**"
      - "web/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            engine/package-lock.json
            web/package-lock.json

      - name: Engine — typecheck + tests
        working-directory: engine
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Web — build
        working-directory: web
        run: |
          npm ci
          npm run build
