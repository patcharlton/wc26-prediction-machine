# main-update — every 6 hours.
# Pull standings + fixtures, populate knockouts, generate predictions for fixtures
# entering the 48h window, recompute accuracy. ~2 + N API-Football requests.
name: main-update

on:
  schedule:
    - cron: "0 */6 * * *" # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
  # TEMP: one-off trigger to reconcile stale data + fire the Render deploy hook.
  # Removed in the immediately-following commit.
  push:
    branches: [main]
    paths: [".github/workflows/main-update.yml"]

permissions:
  contents: write

concurrency:
  group: wc26-data-writer
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_run-job.yml
    with:
      job: main-update
    secrets: inherit
