name: zz-diag-callee
on:
  workflow_call:
    inputs:
      job:
        required: true
        type: string
concurrency:
  group: zz-diag-writer
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "job=${{ inputs.job }}"
