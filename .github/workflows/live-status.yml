# live-status — cron every 15 minutes; while a match is in play each run becomes
# a polling session (see _run-job.yml) pushing score changes every ~5 minutes.
# Self-guards on stored kickoff times: idle ticks exit without an API call.
name: live-status

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes UTC
  workflow_dispatch:
  # Any code push to main also kickstarts a session (data commits carry
  # [skip ci] so the engine's own pushes never retrigger it). Cheap insurance
  # against GitHub's laggy cron scheduler: idle ticks exit without an API call.
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: wc26-live-session
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_run-job.yml
    with:
      job: live-status
    secrets: inherit
